kind = "web"
previewPath = "/"
title = "Pixel Budget Jar"
version = "1.0.0"
id = "artifacts/pixel-budget-jar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20867

[services.development]
run = "pnpm --filter @workspace/pixel-budget-jar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pixel-budget-jar", "run", "build" ]
publicDir = "artifacts/pixel-budget-jar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20867"
BASE_PATH = "/"
